name: Unpack Uploaded ZIP

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  unpack:
    if: "!contains(github.event.head_commit.message, '[unpack-zip]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Find zip file
        id: findzip
        run: |
          set -euo pipefail
          zipfile=""
          for f in *.zip; do
            if [ -f "$f" ]; then
              zipfile="$f"
              break
            fi
          done
          if [ -z "${zipfile}" ]; then
            echo "No zip files found in repo root, exiting"
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "found=true" >> $GITHUB_OUTPUT
          echo "name=${zipfile}" >> $GITHUB_OUTPUT

      - name: Unpack zip (non-interactive)
        if: steps.findzip.outputs.found == 'true'
        run: |
          set -euo pipefail
          zipfile="${{ steps.findzip.outputs.name }}"
          mkdir -p unpack_temp
          # Use unzip -o to overwrite existing files without prompting, and quote filename
          unzip -q -o -- "$zipfile" -d unpack_temp

          # Use a tar pipeline to copy contents from unpack_temp into repo root non-interactively
          # This preserves permissions and handles dotfiles without prompting
          tar -C unpack_temp -cf - . | tar -C . -xpf -

      - name: Commit extracted files
        if: steps.findzip.outputs.found == 'true'
        env:
          GIT_TERMINAL_PROMPT: 0
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "[unpack-zip] Unpacked uploaded ZIP into repository"

          # Ensure we integrate any remote updates to avoid non-fast-forward errors
          git fetch origin main
          git rebase --autostash origin/main || true

          # Try pushing up to 3 times if necessary
          for i in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Push succeeded"
              exit 0
            else
              echo "Push failed (attempt $i), fetching remote and retrying"
              git fetch origin main
              git rebase --autostash origin/main || true
              sleep 1
            fi
          done

          echo "Push failed after retries"
          exit 1
